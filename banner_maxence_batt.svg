<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d0a1a"/>
      <stop offset="100%" style="stop-color:#080810"/>
    </linearGradient>

    <!-- Yellow glow gradient -->
    <radialGradient id="yellowGlow" cx="30%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFE600;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#FFE600;stop-opacity:0"/>
    </radialGradient>

    <!-- Purple glow gradient -->
    <radialGradient id="purpleGlow" cx="70%" cy="50%" r="55%">
      <stop offset="0%" style="stop-color:#BD00FF;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#BD00FF;stop-opacity:0"/>
    </radialGradient>

    <!-- Text glow filter -->
    <filter id="glowYellow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowPurple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="glowWhite" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="scanlines">
      <feTurbulence type="fractalNoise" baseFrequency="0 0.5" numOctaves="1" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="overlay" result="blended"/>
      <feComposite in="blended" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Clip for entire banner -->
    <clipPath id="bannerClip">
      <rect width="1200" height="400"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="400" fill="url(#bgGrad)"/>

  <!-- Ambient glow layers -->
  <rect width="1200" height="400" fill="url(#yellowGlow)" clip-path="url(#bannerClip)"/>
  <rect width="1200" height="400" fill="url(#purpleGlow)" clip-path="url(#bannerClip)"/>

  <!-- === GRID PERSPECTIVE LINES (bottom) === -->
  <!-- Horizontal grid lines -->
  <g opacity="0.25" stroke="#FFE600" stroke-width="0.6">
    <line x1="0" y1="340" x2="1200" y2="340"/>
    <line x1="0" y1="355" x2="1200" y2="355"/>
    <line x1="0" y1="368" x2="1200" y2="368"/>
    <line x1="0" y1="379" x2="1200" y2="379"/>
    <line x1="0" y1="389" x2="1200" y2="389"/>
    <line x1="0" y1="397" x2="1200" y2="397"/>
  </g>

  <!-- Vanishing perspective lines from center bottom -->
  <g opacity="0.2" stroke="#FFE600" stroke-width="0.7">
    <line x1="600" y1="400" x2="0" y2="340"/>
    <line x1="600" y1="400" x2="120" y2="340"/>
    <line x1="600" y1="400" x2="240" y2="340"/>
    <line x1="600" y1="400" x2="360" y2="340"/>
    <line x1="600" y1="400" x2="480" y2="340"/>
    <line x1="600" y1="400" x2="600" y2="340"/>
    <line x1="600" y1="400" x2="720" y2="340"/>
    <line x1="600" y1="400" x2="840" y2="340"/>
    <line x1="600" y1="400" x2="960" y2="340"/>
    <line x1="600" y1="400" x2="1080" y2="340"/>
    <line x1="600" y1="400" x2="1200" y2="340"/>
  </g>

  <!-- === DECORATIVE CIRCUIT LINES LEFT === -->
  <g stroke="#FFE600" stroke-width="1.5" fill="none" opacity="0.6">
    <polyline points="0,80 60,80 80,60 140,60"/>
    <polyline points="0,120 40,120 60,100 100,100 120,80 160,80"/>
    <polyline points="0,200 30,200 50,180 90,180"/>
    <polyline points="0,260 50,260 70,240 110,240 130,220 170,220"/>
    <polyline points="80,60 80,140 100,160 100,200"/>
    <circle cx="140" cy="60" r="4" fill="#FFE600"/>
    <circle cx="90" cy="180" r="4" fill="#FFE600"/>
    <circle cx="80" cy="140" r="3" fill="#FFE600" opacity="0.7"/>
  </g>

  <!-- === DECORATIVE CIRCUIT LINES RIGHT === -->
  <g stroke="#BD00FF" stroke-width="1.5" fill="none" opacity="0.6">
    <polyline points="1200,100 1140,100 1120,80 1060,80"/>
    <polyline points="1200,150 1160,150 1140,130 1100,130 1080,110 1040,110"/>
    <polyline points="1200,230 1170,230 1150,210 1110,210"/>
    <polyline points="1200,280 1150,280 1130,260 1090,260 1070,240 1030,240"/>
    <polyline points="1120,80 1120,160 1100,180 1100,220"/>
    <circle cx="1060" cy="80" r="4" fill="#BD00FF"/>
    <circle cx="1110" cy="210" r="4" fill="#BD00FF"/>
    <circle cx="1120" cy="160" r="3" fill="#BD00FF" opacity="0.7"/>
  </g>

  <!-- === DIAGONAL ACCENT SLASHES === -->
  <g opacity="0.5">
    <!-- Left accent -->
    <polygon points="0,0 80,0 0,80" fill="#FFE600" opacity="0.08"/>
    <line x1="85" y1="0" x2="0" y2="85" stroke="#FFE600" stroke-width="2"/>
    <line x1="100" y1="0" x2="0" y2="100" stroke="#FFE600" stroke-width="0.8" opacity="0.5"/>
    <!-- Right accent -->
    <polygon points="1200,0 1120,0 1200,80" fill="#BD00FF" opacity="0.08"/>
    <line x1="1115" y1="0" x2="1200" y2="85" stroke="#BD00FF" stroke-width="2"/>
    <line x1="1100" y1="0" x2="1200" y2="100" stroke="#BD00FF" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- === HORIZONTAL ACCENT BARS === -->
  <!-- Top bar -->
  <rect x="0" y="0" width="1200" height="3" fill="#FFE600" opacity="0.9" filter="url(#glowYellow)"/>
  <!-- Sub top bar -->
  <rect x="0" y="6" width="1200" height="1" fill="#FFE600" opacity="0.3"/>
  <!-- Bottom bar -->
  <rect x="0" y="397" width="1200" height="3" fill="#BD00FF" opacity="0.9" filter="url(#glowPurple)"/>
  <rect x="0" y="393" width="1200" height="1" fill="#BD00FF" opacity="0.3"/>

  <!-- Side vertical accent bars -->
  <rect x="0" y="0" width="3" height="400" fill="#FFE600" opacity="0.7"/>
  <rect x="1197" y="0" width="3" height="400" fill="#BD00FF" opacity="0.7"/>

  <!-- === CENTER BRACKET DECORATION === -->
  <!-- Left bracket -->
  <g stroke="#FFE600" stroke-width="2" fill="none" filter="url(#glowYellow)" opacity="0.9">
    <polyline points="180,100 150,100 150,300 180,300"/>
    <line x1="150" y1="200" x2="170" y2="200"/>
  </g>
  <!-- Right bracket -->
  <g stroke="#BD00FF" stroke-width="2" fill="none" filter="url(#glowPurple)" opacity="0.9">
    <polyline points="1020,100 1050,100 1050,300 1020,300"/>
    <line x1="1050" y1="200" x2="1030" y2="200"/>
  </g>

  <!-- === SMALL DECORATIVE DOTS / CROSS MARKS === -->
  <g fill="#FFE600" opacity="0.7">
    <rect x="195" y="98" width="8" height="2"/>
    <rect x="198" y="95" width="2" height="8"/>
    <rect x="195" y="298" width="8" height="2"/>
    <rect x="198" y="295" width="2" height="8"/>
  </g>
  <g fill="#BD00FF" opacity="0.7">
    <rect x="997" y="98" width="8" height="2"/>
    <rect x="1000" y="95" width="2" height="8"/>
    <rect x="997" y="298" width="8" height="2"/>
    <rect x="1000" y="295" width="2" height="8"/>
  </g>

  <!-- === SCANLINE OVERLAY === -->
  <rect width="1200" height="400" fill="none" opacity="0.03" style="background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.5) 2px, rgba(0,0,0,0.5) 4px)"/>

  <!-- === GLITCH HORIZONTAL LINES (background detail) === -->
  <rect x="0" y="155" width="1200" height="1" fill="#FFE600" opacity="0.04"/>
  <rect x="0" y="245" width="1200" height="1" fill="#BD00FF" opacity="0.04"/>

  <!-- === MAIN NAME TEXT === -->
  <!-- Shadow / glitch offset layer -->
  <text x="602" y="205" 
        font-family="'Courier New', 'Lucida Console', monospace" 
        font-size="90" 
        font-weight="900"
        letter-spacing="8"
        text-anchor="middle" 
        fill="#BD00FF" 
        opacity="0.5"
        transform="translate(3, 2)">MAXENCE</text>

  <!-- Main MAXENCE -->
  <text x="600" y="205" 
        font-family="'Courier New', 'Lucida Console', monospace" 
        font-size="90" 
        font-weight="900"
        letter-spacing="8"
        text-anchor="middle" 
        fill="#FFE600"
        filter="url(#bigGlow)">MAXENCE</text>

  <!-- Glitch layer MAXENCE -->
  <text x="599" y="205" 
        font-family="'Courier New', 'Lucida Console', monospace" 
        font-size="90" 
        font-weight="900"
        letter-spacing="8"
        text-anchor="middle" 
        fill="#ffffff"
        opacity="0.07">MAXENCE</text>

  <!-- Shadow / glitch offset BATT -->
  <text x="602" y="295" 
        font-family="'Courier New', 'Lucida Console', monospace" 
        font-size="90" 
        font-weight="900"
        letter-spacing="20"
        text-anchor="middle" 
        fill="#FFE600" 
        opacity="0.4"
        transform="translate(3, 2)">BATT</text>

  <!-- Main BATT -->
  <text x="600" y="295" 
        font-family="'Courier New', 'Lucida Console', monospace" 
        font-size="90" 
        font-weight="900"
        letter-spacing="20"
        text-anchor="middle" 
        fill="#BD00FF"
        filter="url(#bigGlow)">BATT</text>

  <!-- === SEPARATOR LINE BETWEEN NAME PARTS === -->
  <line x1="220" y1="218" x2="980" y2="218" stroke="#FFE600" stroke-width="1" opacity="0.4"/>
  <line x1="220" y1="220" x2="980" y2="220" stroke="#BD00FF" stroke-width="1" opacity="0.3"/>

  <!-- Diamond accent on separator -->
  <polygon points="600,213 607,220 600,227 593,220" fill="#FFE600" filter="url(#glowYellow)" opacity="0.9"/>
  <polygon points="600,213 607,220 600,227 593,220" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.5"/>

  <!-- === CORNER DECORATIONS === -->
  <!-- Top-left corner HUD element -->
  <g opacity="0.8">
    <rect x="10" y="12" width="40" height="2" fill="#FFE600"/>
    <rect x="10" y="18" width="25" height="1" fill="#FFE600" opacity="0.5"/>
    <rect x="10" y="12" width="2" height="20" fill="#FFE600"/>
  </g>

  <!-- Top-right corner HUD element -->
  <g opacity="0.8">
    <rect x="1150" y="12" width="40" height="2" fill="#BD00FF"/>
    <rect x="1165" y="18" width="25" height="1" fill="#BD00FF" opacity="0.5"/>
    <rect x="1188" y="12" width="2" height="20" fill="#BD00FF"/>
  </g>

  <!-- Bottom-left HUD -->
  <g opacity="0.7">
    <rect x="10" y="375" width="30" height="2" fill="#FFE600"/>
    <rect x="10" y="369" width="2" height="10" fill="#FFE600"/>
    <text x="16" y="367" font-family="'Courier New', monospace" font-size="9" fill="#FFE600" opacity="0.6" letter-spacing="2">SYS.OK</text>
  </g>

  <!-- Bottom-right HUD -->
  <g opacity="0.7">
    <rect x="1160" y="375" width="30" height="2" fill="#BD00FF"/>
    <rect x="1188" y="369" width="2" height="10" fill="#BD00FF"/>
    <text x="1100" y="367" font-family="'Courier New', monospace" font-size="9" fill="#BD00FF" opacity="0.6" letter-spacing="2">V.2077</text>
  </g>

  <!-- === SMALL TAG LINE === -->
  <text x="600" y="338" 
        font-family="'Courier New', 'Lucida Console', monospace" 
        font-size="13" 
        font-weight="400"
        letter-spacing="6"
        text-anchor="middle" 
        fill="#ffffff"
        opacity="0.45">// DEVELOPER . BUILDER . CREATOR //</text>

  <!-- === GLITCH ACCENT LINES (stylistic) === -->
  <rect x="210" y="130" width="60" height="2" fill="#FFE600" opacity="0.3"/>
  <rect x="210" y="134" width="30" height="1" fill="#FFE600" opacity="0.15"/>
  <rect x="930" y="130" width="60" height="2" fill="#BD00FF" opacity="0.3"/>
  <rect x="960" y="134" width="30" height="1" fill="#BD00FF" opacity="0.15"/>
</svg>
